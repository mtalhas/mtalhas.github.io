name: Deploy AzureAIWeather

on:
  push:
    branches: [main]
    paths:
      - 'functions/azureaiweather/**'
      - 'infra/azureaiweather.bicep'
      - '.github/workflows/deploy-azureaiweather.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC federated identity

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: azureaiweather-prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/azureaiweather/package-lock.json

      - name: Build functions
        working-directory: functions/azureaiweather
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/azureaiweather.bicep \
              --parameters budgetContactEmail="${{ secrets.AZUREAIWEATHER_BUDGET_EMAIL }}"

      - name: Deploy Functions package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZUREAIWEATHER_FUNC_NAME }}
          package: functions/azureaiweather
